version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: users-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: usersdb
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mongo-data:
